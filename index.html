<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=800,height=480,initial-scale=1,user-scalable=no" />
<title>Emilio Dashboard</title>
<style>
:root {
  --bg: #0b0f1a;
  --card: #121a2a;
  --border: #24324d;
  --text: #f3f7ff;
  --muted: #9eb0cf;
  --accent: #4f7cff;
  --ok: #2fd08c;
  --warn: #f6b73c;
  --danger: #ff5d73;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 800px;
  height: 480px;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 16px;
}
button, input { font: inherit; }

#app { height: 100%; display: grid; grid-template-rows: 62px 1fr 68px; }

/* Top bar */
#topbar {
  border-bottom: 1px solid var(--border);
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 8px 14px;
  gap: 12px;
  background: #0d1422;
}
#brand { font-weight: 700; font-size: 18px; letter-spacing: .3px; }
#weather-chip {
  justify-self: center;
  min-height: 44px;
  border: 1px solid var(--border);
  background: var(--card);
  border-radius: 999px;
  padding: 6px 14px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--text);
}
#weather-chip .meta { font-size: 14px; color: var(--muted); }
#clock-wrap { justify-self: end; text-align: right; }
#clock { font-size: 24px; font-weight: 700; line-height: 1; }
#date { font-size: 14px; color: var(--muted); margin-top: 4px; }

/* Screens */
#screens { overflow: hidden; position: relative; }
.screen {
  position: absolute; inset: 0;
  padding: 12px;
  display: none;
}
.screen.active { display: block; }

.card {
  border: 1px solid var(--border);
  background: var(--card);
  border-radius: 14px;
  padding: 12px;
}
.card h3 { font-size: 15px; color: var(--muted); font-weight: 600; margin-bottom: 10px; }

/* Today */
#today-grid {
  height: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 10px;
}
.row-item {
  min-height: 48px;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 8px;
  background: rgba(0,0,0,.14);
}
.row-item:last-child { margin-bottom: 0; }
.item-main { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-sub { color: var(--muted); font-size: 14px; margin-top: 3px; }
.action-btn {
  min-height: 46px;
  min-width: 76px;
  border: none;
  border-radius: 12px;
  padding: 0 14px;
  background: var(--accent);
  color: white;
  font-weight: 700;
}

/* Tasks */
.screen-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.screen-title { font-size: 21px; font-weight: 700; }
#task-filters { display: flex; gap: 8px; margin-bottom: 10px; }
.filter-chip {
  min-height: 44px;
  padding: 0 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
}
.filter-chip.active { border-color: var(--accent); color: var(--accent); }
#add-task-btn {
  width: 100%;
  min-height: 48px;
  border-radius: 12px;
  border: none;
  background: var(--accent);
  color: white;
  font-weight: 700;
  margin-bottom: 10px;
}
.list { overflow: auto; max-height: 270px; padding-right: 2px; }
.task-row {
  min-height: 52px;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 8px;
  display: grid;
  grid-template-columns: 34px 1fr auto;
  gap: 8px;
  align-items: center;
  background: rgba(0,0,0,.14);
}
.check {
  width: 28px; height: 28px;
  border: 2px solid var(--accent);
  border-radius: 8px;
}
.meta { color: var(--muted); font-size: 14px; }
.pri { font-weight: 700; color: var(--warn); }

/* Calendar */
#calendar-list .row-item { min-height: 58px; }
#add-event-btn { min-height: 48px; width: 100%; margin-top: 10px; }

/* System */
.meter-row {
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 8px;
}
.meter-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
.meter-track { height: 12px; border-radius: 999px; background: #0c1220; overflow: hidden; }
.meter-fill { height: 100%; background: var(--accent); }
.service-row {
  min-height: 46px;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px;
  margin-top: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.pill {
  min-height: 34px;
  min-width: 76px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 12px;
  font-size: 14px;
  font-weight: 700;
}
.pill.ok { background: rgba(47,208,140,.2); color: #8ff2c3; }
.pill.bad { background: rgba(255,93,115,.2); color: #ff9dac; }

/* Bottom nav */
#nav {
  border-top: 1px solid var(--border);
  background: #0d1422;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 8px;
}
.nav-btn {
  min-height: 52px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-weight: 700;
}
.nav-btn.active { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div id="app">
  <header id="topbar">
    <div id="brand">Emilio</div>
    <div id="weather-chip"><span id="weather-icon">🌤️</span><div><div id="weather-temp">--°F</div><div class="meta" id="weather-desc">Loading</div></div></div>
    <div id="clock-wrap"><div id="clock">--:--</div><div id="date">---</div></div>
  </header>

  <main id="screens">
    <section id="screen-today" class="screen active">
      <div id="today-grid">
        <div class="card">
          <h3>Next up</h3>
          <div id="today-nextup"></div>
        </div>
        <div class="card">
          <h3>Top task</h3>
          <div id="today-top-task"></div>
        </div>
        <div class="card">
          <h3>Inbox status</h3>
          <div id="today-inbox"></div>
        </div>
        <div class="card">
          <h3>System health</h3>
          <div id="today-system"></div>
        </div>
      </div>
    </section>

    <section id="screen-tasks" class="screen">
      <div class="screen-header"><div class="screen-title">Tasks</div></div>
      <div id="task-filters">
        <button class="filter-chip active" data-filter="today">Today</button>
        <button class="filter-chip" data-filter="week">This week</button>
        <button class="filter-chip" data-filter="all">All</button>
      </div>
      <button id="add-task-btn">+ Add</button>
      <div id="tasks-list" class="list"></div>
    </section>

    <section id="screen-calendar" class="screen">
      <div class="screen-header"><div class="screen-title">Calendar</div></div>
      <div id="calendar-list" class="list" style="max-height:290px"></div>
      <button id="add-event-btn" class="action-btn">Add event</button>
    </section>

    <section id="screen-system" class="screen">
      <div class="screen-header"><div class="screen-title">System</div></div>
      <div id="system-meters"></div>
      <div id="services-list"></div>
    </section>
  </main>

  <nav id="nav">
    <button class="nav-btn active" data-screen="today">Today</button>
    <button class="nav-btn" data-screen="tasks">Tasks</button>
    <button class="nav-btn" data-screen="calendar">Calendar</button>
    <button class="nav-btn" data-screen="system">System</button>
  </nav>
</div>

<script>
const WEATHER_ICONS = {
  'clear sky':'☀️','few clouds':'🌤️','scattered clouds':'⛅','broken clouds':'🌥️','overcast clouds':'☁️','mist':'🌫️','fog':'🌫️','light rain':'🌦️','moderate rain':'🌧️','thunderstorm':'⛈️'
};
const SERVICE_LABELS = {
  'emilio-openclaw': 'OpenClaw',
  'emilio-google-broker': 'Google',
  'emilio-todoist-broker': 'Todoist',
  'emilio-github-broker': 'GitHub',
  'emilio-weather-broker': 'Weather',
  'emilio-sentry-broker': 'Sentry',
  'emilio-lichess-broker': 'Lichess'
};
const state = { tasks: [], events: [], gmailCount: 0, pi: null, services: {} };

function esc(s=''){ return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])); }
function fmtTime(iso){ if(!iso) return 'All day'; return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
function nowDayKey(){ return new Date().toISOString().slice(0,10); }
function within7(d){ if(!d) return false; const today = new Date(nowDayKey()); const target = new Date(d); return (target-today)/(1000*60*60*24) <= 7; }

function updateClock(){
  const n = new Date();
  document.getElementById('clock').textContent = n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
  document.getElementById('date').textContent = n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
setInterval(updateClock, 1000); updateClock();

async function loadJSON(path){ const r = await fetch(path); return r.json(); }

async function loadData(){
  const paths = [
    '/state/weather.json',
    '/state/todoist.json',
    '/state/calendar.json',
    '/state/gmail.json',
    '/state/services.json'
  ];
  const [w,t,c,g,s] = await Promise.allSettled(paths.map(loadJSON));

  if (w.status === 'fulfilled') {
    const weather = w.value || {};
    document.getElementById('weather-icon').textContent = WEATHER_ICONS[weather.description] || '🌤️';
    document.getElementById('weather-temp').textContent = Math.round(((weather.temp_c || 0)*9/5)+32) + '°F';
    document.getElementById('weather-desc').textContent = weather.description || 'Unavailable';
  } else {
    console.warn('weather.json unavailable', w.reason);
    document.getElementById('weather-icon').textContent = '🌤️';
    document.getElementById('weather-temp').textContent = '--°F';
    document.getElementById('weather-desc').textContent = 'Unavailable';
  }

  state.tasks = t.status === 'fulfilled' ? (t.value.tasks || []) : [];
  state.events = c.status === 'fulfilled'
    ? (c.value.events || []).slice().sort((a,b)=>new Date(a.start||'2100-01-01') - new Date(b.start||'2100-01-01'))
    : [];
  state.gmailCount = g.status === 'fulfilled' ? (g.value.count || 0) : 0;
  state.pi = s.status === 'fulfilled' ? (s.value.pi || {}) : {};
  state.services = s.status === 'fulfilled' ? (s.value.services || {}) : {};

  renderToday();
  renderTasks('today');
  renderCalendar();
  renderSystem();
}

function renderToday(){
  const next = state.events.slice(0,2);
  document.getElementById('today-nextup').innerHTML = next.length ? next.map(ev =>
    `<div class="row-item"><div><div class="item-main">${esc(ev.summary || 'Event')}</div><div class="item-sub">${fmtTime(ev.start)}${ev.location?` · ${esc(ev.location)}`:''}</div></div></div>`
  ).join('') : `<div class="row-item"><div class="item-main">No upcoming events</div></div>`;

  const topTask = state.tasks.slice().sort((a,b)=>(b.priority||1)-(a.priority||1))[0];
  document.getElementById('today-top-task').innerHTML = topTask
    ? `<div class="row-item"><div><div class="item-main">${esc(topTask.content)}</div><div class="item-sub">P${topTask.priority||1}${topTask.due_date?` · ${esc(topTask.due_date)}`:''}</div></div><button class="action-btn">Start</button></div>`
    : `<div class="row-item"><div class="item-main">No tasks due</div></div>`;

  document.getElementById('today-inbox').innerHTML = `<div class="row-item"><div><div class="item-main">${state.gmailCount} unread</div><div class="item-sub">Inbox snapshot</div></div><button class="action-btn" id="mark-read-btn">Mark all read</button></div>`;
  document.getElementById('mark-read-btn')?.addEventListener('click', ()=>triggerAction('/api/gmail/mark-all-read'));

  const pi = state.pi || {};
  const mem = pi.memory || {}; const disk = pi.disk || {};
  const ramPct = mem.total_mb ? Math.round((mem.used_mb/mem.total_mb)*100) : 0;
  document.getElementById('today-system').innerHTML =
    `<div class="row-item"><div><div class="item-main">CPU ${Number(pi.load_avg?.['1m']||0).toFixed(2)} · RAM ${ramPct}%</div><div class="item-sub">Temp ${pi.cpu_temp_c||'--'}°C · Disk ${disk.pct||'--'}</div></div></div>`;
}

function renderTasks(filter='today'){
  const today = nowDayKey();
  let tasks = state.tasks.slice();
  if (filter === 'today') tasks = tasks.filter(t => !t.due_date || t.due_date <= today);
  if (filter === 'week') tasks = tasks.filter(t => !t.due_date || within7(t.due_date));
  tasks.sort((a,b)=>(b.priority||1)-(a.priority||1));

  document.getElementById('tasks-list').innerHTML = tasks.length ? tasks.map(t =>
    `<div class="task-row"><div class="check"></div><div><div class="item-main">${esc(t.content)}</div><div class="meta">${t.due_date?esc(t.due_date):'No due date'} · <span class="pri">P${t.priority||1}</span></div></div><div>${t.is_recurring?'🔁':''}</div></div>`
  ).join('') : `<div class="row-item"><div class="item-main">No tasks in this filter</div></div>`;
}

function renderCalendar(){
  const evs = state.events.slice(0,8);
  document.getElementById('calendar-list').innerHTML = evs.length ? evs.map(ev =>
    `<div class="row-item"><div><div class="item-main">${esc(ev.summary || 'Event')}</div><div class="item-sub">${fmtTime(ev.start)}${ev.location?` · ${esc(ev.location)}`:''}</div></div></div>`
  ).join('') : `<div class="row-item"><div class="item-main">No upcoming events</div></div>`;
}

function meter(name,pct,raw){
  const cl = pct > 85 ? 'var(--danger)' : pct > 65 ? 'var(--warn)' : 'var(--accent)';
  return `<div class="meter-row"><div class="meter-top"><strong>${name}</strong><span>${raw}</span></div><div class="meter-track"><div class="meter-fill" style="width:${Math.min(100,pct)}%;background:${cl}"></div></div></div>`;
}

function renderSystem(){
  const pi = state.pi || {}; const mem = pi.memory || {}; const disk = pi.disk || {};
  const cpu = Math.min(100, Math.round((Number(pi.load_avg?.['1m']||0)/4)*100));
  const ram = mem.total_mb ? Math.round((mem.used_mb/mem.total_mb)*100) : 0;
  const diskPct = parseInt(disk.pct || '0') || 0;
  const temp = Math.round(((pi.cpu_temp_c||0)/85)*100);
  document.getElementById('system-meters').innerHTML =
    meter('CPU', cpu, `${cpu}%`) +
    meter('RAM', ram, `${ram}%`) +
    meter('Disk', diskPct, disk.pct || '--') +
    meter('Temp', temp, `${pi.cpu_temp_c||'--'}°C`);

  document.getElementById('services-list').innerHTML = Object.entries(SERVICE_LABELS).map(([k,v])=>{
    const ok = state.services[k] === 'active';
    return `<div class="service-row"><strong>${v}</strong><span class="pill ${ok?'ok':'bad'}">${ok?'Active':'Down'}</span></div>`;
  }).join('');
}

// nav
Array.from(document.querySelectorAll('.nav-btn')).forEach(btn => {
  btn.addEventListener('click', () => {
    const target = btn.dataset.screen;
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('screen-' + target).classList.add('active');
  });
});
Array.from(document.querySelectorAll('.filter-chip')).forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    renderTasks(chip.dataset.filter);
  });
});

function triggerAction(path){
  return fetch(path)
    .then(r => {
      if (!r.ok) throw new Error(`Action failed: ${r.status}`);
      return r;
    })
    .catch(err => console.warn(path, err));
}

document.getElementById('add-task-btn').addEventListener('click', ()=>triggerAction('/api/todoist/add'));
document.getElementById('add-event-btn').addEventListener('click', ()=>triggerAction('/api/calendar/add'));

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
