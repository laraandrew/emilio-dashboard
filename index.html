<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800,height=480,initial-scale=1,user-scalable=no">
<title>Emilio</title>
<style>
:root {
  --bg:       #07070f;
  --card:     #0f0f1e;
  --border:   #1e1e38;
  --accent:   #4f46e5;
  --accent2:  #7c3aed;
  --text:     #e2e8f0;
  --muted:    #64748b;
  --green:    #22c55e;
  --red:      #ef4444;
  --amber:    #f59e0b;
  --blue:     #3b82f6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 800px; height: 480px; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; }

/* ── Header ── */
#header {
  display: flex; align-items: center; justify-content: space-between;
  height: 44px; padding: 0 12px;
  background: var(--card); border-bottom: 1px solid var(--border);
}
#logo { font-size: 15px; font-weight: 700; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; }
#weather-strip { display: flex; align-items: center; gap: 8px; font-size: 13px; }
#weather-icon { font-size: 18px; }
#weather-temp { font-size: 18px; font-weight: 700; }
#weather-desc { color: var(--muted); font-size: 11px; }
#clock-block { text-align: right; }
#clock { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 1px; }
#date { font-size: 11px; color: var(--muted); }

/* ── Grid ── */
#grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 1px;
  height: 396px; /* 480 - 44 header - 40 footer */
  background: var(--border);
}
.panel { background: var(--card); padding: 10px 12px; overflow: hidden; display: flex; flex-direction: column; gap: 6px; }
.panel-header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.panel-title { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.badge { font-size: 10px; padding: 1px 6px; border-radius: 10px; background: var(--accent); color: white; font-weight: 700; }
.badge.red { background: var(--red); }
.badge.amber { background: var(--amber); color: #000; }
.badge.green { background: var(--green); color: #000; }
.panel-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 4px; }

/* ── Rows ── */
.row { display: flex; align-items: flex-start; gap: 8px; padding: 5px 6px; border-radius: 6px; background: var(--bg); flex-shrink: 0; line-height: 1.3; }
.row:hover { background: #1a1a2e; }
.dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
.dot.red    { background: var(--red); }
.dot.amber  { background: var(--amber); }
.dot.green  { background: var(--green); }
.dot.blue   { background: var(--blue); }
.dot.purple { background: var(--accent2); }
.dot.muted  { background: var(--muted); }
.row-text { flex: 1; overflow: hidden; }
.row-main { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-sub  { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-time { font-size: 10px; color: var(--muted); flex-shrink: 0; white-space: nowrap; }

/* ── Quick-add input ── */
.quick-add { display: flex; gap: 6px; flex-shrink: 0; margin-top: 4px; }
.quick-add input {
  flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-size: 12px; padding: 5px 8px; outline: none;
}
.quick-add input:focus { border-color: var(--accent); }
.quick-add input::placeholder { color: var(--muted); }
.btn {
  background: var(--accent); border: none; border-radius: 6px; color: white;
  font-size: 11px; font-weight: 700; padding: 5px 10px; cursor: pointer; white-space: nowrap;
}
.btn:hover { background: var(--accent2); }
.btn.sm { padding: 3px 8px; font-size: 10px; }
.btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.btn.ghost:hover { border-color: var(--accent); color: var(--text); }

/* ── System panel ── */
.bar-row { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.bar-label { font-size: 10px; color: var(--muted); width: 42px; flex-shrink: 0; }
.bar-track { flex: 1; height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.bar-fill  { height: 100%; border-radius: 3px; background: var(--accent); transition: width .5s; }
.bar-fill.warn  { background: var(--amber); }
.bar-fill.danger { background: var(--red); }
.bar-val { font-size: 10px; color: var(--muted); width: 34px; text-align: right; flex-shrink: 0; }
.svc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
.svc { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); }
.svc .dot { width: 5px; height: 5px; margin-top: 0; }

/* ── Footer ── */
#footer {
  display: flex; align-items: center; justify-content: space-between;
  height: 40px; padding: 0 14px;
  background: var(--card); border-top: 1px solid var(--border);
}
#chess-strip { display: flex; gap: 16px; align-items: center; }
.chess-stat { font-size: 11px; }
.chess-label { color: var(--muted); margin-right: 3px; }
.chess-val { font-weight: 700; }
#footer-right { display: flex; gap: 10px; align-items: center; }
#updated-label { font-size: 10px; color: var(--muted); }
#refresh-btn { background: none; border: 1px solid var(--border); border-radius: 5px; color: var(--muted); font-size: 10px; padding: 3px 8px; cursor: pointer; }
#refresh-btn:hover { border-color: var(--accent); color: var(--text); }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: white; padding: 8px 18px; border-radius: 8px;
  font-size: 12px; font-weight: 600; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999;
}
#toast.show { opacity: 1; }

/* ── Empty state ── */
.empty { font-size: 11px; color: var(--muted); text-align: center; padding: 12px 0; }
</style>
</head>
<body>

<!-- ── Header ── -->
<div id="header">
  <div id="logo">EMILIO</div>
  <div id="weather-strip">
    <span id="weather-icon">🌤</span>
    <span id="weather-temp">—°F</span>
    <div>
      <div id="weather-desc">Loading...</div>
      <div id="weather-wind" style="font-size:10px;color:var(--muted)"></div>
    </div>
  </div>
  <div id="clock-block">
    <div id="clock">--:--:--</div>
    <div id="date">...</div>
  </div>
</div>

<!-- ── Grid ── -->
<div id="grid">

  <!-- TASKS -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Tasks</span>
      <span id="tasks-badge" class="badge">0</span>
    </div>
    <div class="panel-body" id="tasks-list">
      <div class="empty">Loading...</div>
    </div>
    <div class="quick-add">
      <input id="task-input" type="text" placeholder="Add a task..." maxlength="120">
      <button class="btn" onclick="addTask()">Add</button>
    </div>
  </div>

  <!-- EMAIL -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Inbox</span>
      <div style="display:flex;gap:5px;align-items:center">
        <span id="inbox-badge" class="badge">0</span>
        <button class="btn sm ghost" onclick="markAllRead()">Mark read</button>
      </div>
    </div>
    <div class="panel-body" id="inbox-list">
      <div class="empty">Loading...</div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Calendar</span>
      <span id="cal-badge" class="badge">0</span>
    </div>
    <div class="panel-body" id="cal-list">
      <div class="empty">Loading...</div>
    </div>
  </div>

  <!-- SYSTEM -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">System</span>
      <span id="sys-status" class="badge green">OK</span>
    </div>
    <div class="panel-body" id="sys-body">
      <div class="bar-row"><span class="bar-label">CPU</span><div class="bar-track"><div class="bar-fill" id="cpu-bar" style="width:0%"></div></div><span class="bar-val" id="cpu-val">—</span></div>
      <div class="bar-row"><span class="bar-label">RAM</span><div class="bar-track"><div class="bar-fill" id="ram-bar" style="width:0%"></div></div><span class="bar-val" id="ram-val">—</span></div>
      <div class="bar-row"><span class="bar-label">Disk</span><div class="bar-track"><div class="bar-fill" id="disk-bar" style="width:0%"></div></div><span class="bar-val" id="disk-val">—</span></div>
      <div class="bar-row"><span class="bar-label">Temp</span><div class="bar-track"><div class="bar-fill" id="temp-bar" style="width:0%"></div></div><span class="bar-val" id="temp-val">—</span></div>
      <div style="margin-top:4px;">
        <div class="panel-title" style="margin-bottom:5px">Services</div>
        <div class="svc-grid" id="svc-grid"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── Footer ── -->
<div id="footer">
  <div id="chess-strip">
    <span style="font-size:14px">♟</span>
    <span class="chess-stat"><span class="chess-label">Blitz</span><span class="chess-val" id="chess-blitz">—</span></span>
    <span class="chess-stat"><span class="chess-label">Rapid</span><span class="chess-val" id="chess-rapid">—</span></span>
    <span class="chess-stat"><span class="chess-label">Bullet</span><span class="chess-val" id="chess-bullet">—</span></span>
  </div>
  <div id="footer-right">
    <span id="updated-label">Updated —</span>
    <button id="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Helpers ──────────────────────────────────────────────────────────────────
function toast(msg, ms=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function apiCall(path, body) {
  // API layer not yet deployed — show toast
  toast('⚡ Action sent to Emilio');
  return fetch('/api/' + path, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  }).catch(() => toast('API not yet available — action queued'));
}

function tempF(c) { return Math.round(c * 9/5 + 32); }
function mphFromMs(ms) { return Math.round(ms * 2.237); }

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', hour12:true});
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

function dotColor(priority) {
  if (priority === 4) return 'red';
  if (priority === 3) return 'amber';
  if (priority === 2) return 'blue';
  return 'muted';
}

function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : (s || ''); }

function setBar(id, pct) {
  const el = document.getElementById(id);
  el.style.width = Math.min(pct, 100) + '%';
  el.className = 'bar-fill' + (pct > 85 ? ' danger' : pct > 65 ? ' warn' : '');
}

// ── Clock ────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
  document.getElementById('date').textContent =
    now.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric', year:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

// ── Weather ──────────────────────────────────────────────────────────────────
const WEATHER_ICONS = {
  'clear sky': '☀️', 'few clouds': '🌤', 'scattered clouds': '⛅',
  'broken clouds': '🌥', 'overcast clouds': '☁️',
  'light rain': '🌦', 'moderate rain': '🌧', 'heavy intensity rain': '⛈',
  'thunderstorm': '⛈', 'snow': '❄️', 'mist': '🌫', 'fog': '🌫', 'haze': '🌫'
};

async function loadWeather() {
  try {
    const d = await fetch('/state/weather.json').then(r => r.json());
    const icon = WEATHER_ICONS[d.description] || '🌤';
    document.getElementById('weather-icon').textContent = icon;
    document.getElementById('weather-temp').textContent = tempF(d.temp_c) + '°F';
    document.getElementById('weather-desc').textContent = d.description;
    document.getElementById('weather-wind').textContent =
      d.wind_speed_ms ? `${mphFromMs(d.wind_speed_ms)} mph ${d.wind_dir || ''}`.trim() : '';
  } catch(e) {}
}

// ── Tasks ────────────────────────────────────────────────────────────────────
async function loadTasks() {
  try {
    const d = await fetch('/state/todoist.json').then(r => r.json());
    const tasks = (d.tasks || []).slice(0, 6);
    const badge = document.getElementById('tasks-badge');
    badge.textContent = d.count || tasks.length;
    const overdue = tasks.filter(t => t.due_date && t.due_date < new Date().toISOString().slice(0,10)).length;
    badge.className = 'badge' + (overdue > 0 ? ' red' : '');

    const el = document.getElementById('tasks-list');
    if (!tasks.length) { el.innerHTML = '<div class="empty">All clear ✓</div>'; return; }
    el.innerHTML = tasks.map(t => {
      const due = t.due_date && t.due_date < new Date().toISOString().slice(0,10)
        ? `<span style="color:var(--red)">${t.due_date}</span>`
        : t.due_date ? `<span>${t.due_date}</span>` : '';
      return `<div class="row">
        <div class="dot ${dotColor(t.priority)}"></div>
        <div class="row-text">
          <div class="row-main">${truncate(t.content, 42)}</div>
          ${due ? `<div class="row-sub">${due}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  } catch(e) {}
}

async function addTask() {
  const input = document.getElementById('task-input');
  const content = input.value.trim();
  if (!content) return;
  input.value = '';
  toast('Adding task…');
  // API call (will gracefully fail if API not yet deployed)
  try {
    await fetch('/api/todoist/add', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({content})
    });
    toast('✓ Task added');
  } catch {
    toast('✓ Task queued for Emilio');
  }
}

document.getElementById('task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

// ── Email ────────────────────────────────────────────────────────────────────
async function loadInbox() {
  try {
    const d = await fetch('/state/gmail.json').then(r => r.json());
    const msgs = (d.messages || []).slice(0, 5);
    const count = d.count || msgs.length;
    const badge = document.getElementById('inbox-badge');
    badge.textContent = count;
    badge.className = 'badge' + (count > 10 ? ' red' : count > 5 ? ' amber' : '');

    const el = document.getElementById('inbox-list');
    if (!msgs.length) { el.innerHTML = '<div class="empty">Inbox zero ✓</div>'; return; }
    el.innerHTML = msgs.map(m => {
      const from = m.from ? m.from.replace(/<[^>]+>/, '').replace(/"/g, '').trim() : '—';
      return `<div class="row">
        <div class="dot blue"></div>
        <div class="row-text">
          <div class="row-main">${truncate(m.subject, 36)}</div>
          <div class="row-sub">${truncate(from, 30)}</div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {}
}

async function markAllRead() {
  toast('Marking all read…');
  try {
    await fetch('/api/gmail/mark-all-read', {method:'POST'});
    toast('✓ Done');
  } catch { toast('✓ Queued for Emilio'); }
}

// ── Calendar ─────────────────────────────────────────────────────────────────
async function loadCalendar() {
  try {
    const d = await fetch('/state/calendar.json').then(r => r.json());
    const events = (d.events || []).slice(0, 4);
    document.getElementById('cal-badge').textContent = d.count || events.length;

    const el = document.getElementById('cal-list');
    if (!events.length) { el.innerHTML = '<div class="empty">Nothing today</div>'; return; }
    el.innerHTML = events.map(ev => {
      const isAllDay = ev.start && !ev.start.includes('T');
      const timeStr = isAllDay ? 'All day' : fmtTime(ev.start);
      const loc = ev.location ? `· ${truncate(ev.location, 20)}` : '';
      return `<div class="row">
        <div class="dot purple"></div>
        <div class="row-text">
          <div class="row-main">${truncate(ev.summary, 36)}</div>
          <div class="row-sub">${timeStr}${loc}</div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {}
}

// ── System ───────────────────────────────────────────────────────────────────
async function loadSystem() {
  try {
    const d = await fetch('/state/services.json').then(r => r.json());
    const pi = d.pi || {};
    const svcs = d.services || {};

    // CPU — approximate from load avg vs cores (Pi 4 = 4 cores)
    const load1 = parseFloat((pi.load_avg || {})['1m'] || 0);
    const cpuPct = Math.min(Math.round(load1 / 4 * 100), 100);
    setBar('cpu-bar', cpuPct);
    document.getElementById('cpu-val').textContent = `${cpuPct}%`;

    // RAM
    const mem = pi.memory || {};
    const ramPct = mem.total_mb ? Math.round(mem.used_mb / mem.total_mb * 100) : 0;
    setBar('ram-bar', ramPct);
    document.getElementById('ram-val').textContent = `${ramPct}%`;

    // Disk
    const disk = pi.disk || {};
    const diskPct = parseInt(disk.pct || '0') || 0;
    setBar('disk-bar', diskPct);
    document.getElementById('disk-val').textContent = disk.pct || '—';

    // Temp
    const tempC = pi.cpu_temp_c || 0;
    const tempPct = Math.min(Math.round((tempC / 85) * 100), 100);
    setBar('temp-bar', tempPct);
    document.getElementById('temp-val').textContent = `${tempC}°C`;

    // Services
    const svcNames = {
      'emilio-openclaw': 'AI', 'emilio-google-broker': 'Google',
      'emilio-todoist-broker': 'Todoist', 'emilio-github-broker': 'GitHub',
      'emilio-weather-broker': 'Weather', 'emilio-sentry-broker': 'Sentry',
      'emilio-lichess-broker': 'Lichess'
    };
    const allOk = Object.values(svcs).every(v => v === 'active');
    document.getElementById('sys-status').textContent = allOk ? 'OK' : 'ALERT';
    document.getElementById('sys-status').className = 'badge ' + (allOk ? 'green' : 'red');

    document.getElementById('svc-grid').innerHTML = Object.entries(svcNames).map(([k, label]) => {
      const ok = svcs[k] === 'active';
      return `<div class="svc"><div class="dot ${ok ? 'green' : 'red'}"></div>${label}</div>`;
    }).join('');
  } catch(e) {}
}

// ── Chess ────────────────────────────────────────────────────────────────────
async function loadChess() {
  try {
    const d = await fetch('/state/lichess.json').then(r => r.json());
    const r = d.ratings || {};
    document.getElementById('chess-blitz').textContent  = r.blitz  || '—';
    document.getElementById('chess-rapid').textContent  = r.rapid  || '—';
    document.getElementById('chess-bullet').textContent = r.bullet || '—';
  } catch(e) {}
}

// ── Load all ─────────────────────────────────────────────────────────────────
async function loadAll() {
  await Promise.all([loadWeather(), loadTasks(), loadInbox(), loadCalendar(), loadSystem(), loadChess()]);
  document.getElementById('updated-label').textContent =
    'Updated ' + new Date().toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
}

loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
